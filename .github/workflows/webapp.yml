name: WebApp CI

on:
  push:
    branches: [main]
    paths:
      - 'WebApp/**'
      - '.github/workflows/webapp.yml'
  pull_request:
    branches: [main]
    paths:
      - 'WebApp/**'
      - '.github/workflows/webapp.yml'

jobs:
  backend:
    name: Backend (API)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WebApp/back_student

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: npm
          cache-dependency-path: WebApp/back_student/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run tsc

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WebApp/front_student

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: npm
          cache-dependency-path: WebApp/front_student/package.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --watchAll=false
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          CI: true
          REACT_APP_API_URL: localhost:3000

  docker:
    name: Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: WebApp/back_student
          push: false
          load: true
          tags: webapp-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: WebApp/front_student
          push: false
          load: true
          tags: webapp-front:ci
          build-args: |
            REACT_APP_API_URL=api:3000
          cache-from: type=gha
          cache-to: type=gha,mode=max
