# Basic rate limiting (zone stored in worker shared memory)
# These directives must be defined in the http context; files in conf.d are
# included inside http in the default nginx setup, so placing them at the
# top-level of this file ensures they're in the correct context.
limit_req_zone $binary_remote_addr zone=one:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen       80;
    server_name  localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        limit_req zone=one burst=5 nodelay;
        limit_conn addr 10;
        try_files $uri $uri/ /index.html;
    }

    # API requests are sent directly from the frontend app using REACT_APP_API_URL.
    # Keep this config static for standalone deployment (Render, etc.).
}
