# Basic rate limiting (zone stored in worker shared memory)
# These directives must be defined in the http context; files in conf.d are
# included inside http in the default nginx setup, so placing them at the
# top-level of this file ensures they're in the correct context.
limit_req_zone $binary_remote_addr zone=one:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen       80;
    server_name  localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        limit_req zone=one burst=5 nodelay;
        limit_conn addr 10;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # protect against simple floods at the proxy level as a first line of defense
        limit_req zone=one burst=10 nodelay;
        proxy_pass http://api:3000/;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        client_max_body_size 10M;
    }
}
