# Loads variables from .env in this directory (copy from .env.example).
# Compose substitutes ${VAR} below; env_file injects runtime config into containers.

services:
  db:
    image: mysql:8.0
    container_name: cia_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT}:3306"
    restart: on-failure
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cia_network

  api:
    build:
      context: ./back_student
    container_name: cia_api
    ports:
      - "${API_PORT}:3000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_PORT: ${DB_PORT}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cia_network

  front:
    build:
      context: ./front_student
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    container_name: cia_front
    ports:
      - "${FRONT_PORT}:80"
    depends_on:
      - api
    networks:
      - cia_network

volumes:
  db_data:

networks:
  cia_network:
    driver: bridge
